services:
  postgres:
    image: postgres:16-alpine
    container_name: ajans-crm-db
    environment:
      POSTGRES_DB: ajans_crm
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ajans_crm"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - crm-network

  backend:
    build: ./backend
    container_name: ajans-crm-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ajans_crm
      - SPRING_DEVTOOLS_RESTART_ENABLED=false
      - SPRING_DEVTOOLS_ADD_PROPERTIES=false
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME is required}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - COOKIE_SECURE=false
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
      - GA_ENABLED=${GA_ENABLED:-false}
      - GA_PROPERTY_ID=${GA_PROPERTY_ID:-}
      - GA_CREDENTIALS_JSON_BASE64=${GA_CREDENTIALS_JSON_BASE64:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/oauth/google/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - INSTAGRAM_APP_ID=${INSTAGRAM_APP_ID:-}
      - INSTAGRAM_APP_SECRET=${INSTAGRAM_APP_SECRET:-}
      - INSTAGRAM_BUSINESS_CONFIG_ID=${INSTAGRAM_BUSINESS_CONFIG_ID:-}
      - INSTAGRAM_REDIRECT_URI=${INSTAGRAM_REDIRECT_URI:-http://localhost:8080/api/oauth/instagram/callback}
      - PAGESPEED_API_KEY=${PAGESPEED_API_KEY:-}
      - GOOGLE_ADS_DEVELOPER_TOKEN=${GOOGLE_ADS_DEVELOPER_TOKEN:-}
      - GOOGLE_ADS_MANAGER_CUSTOMER_ID=${GOOGLE_ADS_MANAGER_CUSTOMER_ID:-}
      - MAIL_ENABLED=${MAIL_ENABLED:-false}
      - CONTACT_RECIPIENT=${CONTACT_RECIPIENT:-info@fogistanbul.com}
    volumes:
      - ./backend:/app
      - /app/target
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/api/auth/csrf || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - crm-network

  frontend:
    build: ./frontend
    container_name: ajans-crm-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  pgdata:
