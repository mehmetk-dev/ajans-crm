services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ajans_crm
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:?DB_USERNAME is required} -d ajans_crm"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - crm-network

  backend:
    build:
      context: ./backend
      target: production
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ajans_crm
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ALLOWED_ORIGINS: ${APP_URL:?APP_URL is required}
      FRONTEND_URL: ${APP_URL:?APP_URL is required}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-${APP_URL}/api/oauth/google/callback}
      INSTAGRAM_REDIRECT_URI: ${INSTAGRAM_REDIRECT_URI:-${APP_URL}/api/oauth/instagram/callback}
      FILE_UPLOAD_DIR: /data/uploads
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
      SPRING_DEVTOOLS_ADD_PROPERTIES: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@fogistanbul.com}
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      INSTAGRAM_APP_ID: ${INSTAGRAM_APP_ID:-}
      INSTAGRAM_APP_SECRET: ${INSTAGRAM_APP_SECRET:-}
      PAGESPEED_API_KEY: ${PAGESPEED_API_KEY:-}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${GOOGLE_ADS_DEVELOPER_TOKEN:-}
      GOOGLE_ADS_MANAGER_CUSTOMER_ID: ${GOOGLE_ADS_MANAGER_CUSTOMER_ID:-}
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/auth/csrf || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s
    restart: unless-stopped
    networks:
      - crm-network

  frontend:
    build:
      context: ./frontend
      target: production
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  pgdata:
  uploads:
