server:
  port: 8080
  max-http-request-header-size: 64KB

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/ajans_crm
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRY:1800000}   # 30 minutes
    refresh-token-expiration-ms: 604800000 # 7 days

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  cookie:
    secure: ${COOKIE_SECURE:true}

  cloudinary:
    url: ${CLOUDINARY_URL:}

  google-analytics:
    enabled: true

  google-oauth:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/oauth/google/callback}

  instagram:
    app-id: ${INSTAGRAM_APP_ID:}
    app-secret: ${INSTAGRAM_APP_SECRET:}
    redirect-uri: ${INSTAGRAM_REDIRECT_URI:http://localhost:8080/api/oauth/instagram/callback}
    business-config-id: ${INSTAGRAM_BUSINESS_CONFIG_ID:}

  frontend-url: ${FRONTEND_URL:http://localhost:5173}

  google-ads:
    developer-token: ${GOOGLE_ADS_DEVELOPER_TOKEN:}
    manager-customer-id: ${GOOGLE_ADS_MANAGER_CUSTOMER_ID:}

  pagespeed:
    api-key: ${PAGESPEED_API_KEY:}

  file:
    upload-dir: ${FILE_UPLOAD_DIR:uploads}

  mail:
    from: ${MAIL_FROM:noreply@fogistanbul.com}
    enabled: ${MAIL_ENABLED:false}

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}

logging:
  level:
    com.fogistanbul.crm: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
