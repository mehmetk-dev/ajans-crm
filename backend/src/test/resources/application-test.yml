spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false # Disable flyway for H2 tests to avoid SQL syntax issues

app:
  jwt:
    secret: test-secret-key-at-least-256-bits-long-for-hmac-sha-signing-fogistanbul
    access-token-expiration-ms: 3600000
    refresh-token-expiration-ms: 86400000
  google-oauth:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
    redirect-uri: http://localhost:8080/api/oauth/google/callback
  instagram:
    app-id: test-instagram-app-id
    app-secret: test-instagram-app-secret
    redirect-uri: http://localhost:8080/api/oauth/instagram/callback
  frontend-url: http://localhost:5173
